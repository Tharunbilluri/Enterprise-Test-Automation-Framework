[pytest]
minversion = 8.0
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --strict-markers
    --tb=short
    --html=reports/report.html
    --self-contained-html
    --alluredir=reports/allure-results
    --clean-alluredir
    --reruns=1
    --reruns-delay=1
    -ra
markers =
    smoke: Critical path checks for PR / build gates
    regression: Full functional coverage
    sanity: Lightweight post-deploy verification
    ui: Browser UI tests
    api: API tests (future)
    login: Authentication-related scenarios
    cart: Cart and checkout scenarios
    products: Inventory / catalog scenarios
    playwright: Tests that require the Playwright engine
filterwarnings =
    ignore::DeprecationWarning
log_cli = false
log_level = INFO
